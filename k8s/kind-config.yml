kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ai-ops

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # AI Ops Agent
      - containerPort: 30000
        hostPort: 3000
        protocol: TCP
      # sample-app
      - containerPort: 30001
        hostPort: 3001
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Alertmanager
      - containerPort: 30093
        hostPort: 9093
        protocol: TCP
      # Grafana
      - containerPort: 30302
        hostPort: 3002
        protocol: TCP

  - role: worker
  - role: worker