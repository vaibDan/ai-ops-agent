# k8s/agent/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ops-agent
  namespace: ai-ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ops-agent
  template:
    metadata:
      labels:
        app: ai-ops-agent
    spec:
      serviceAccountName: ai-ops-agent   # RBAC identity
      containers:
        - name: agent
          image: ai-ops-agent:local
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-ops-secrets
                  key: google-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-ops-secrets
                  key: openrouter-api-key
            - name: OPENROUTER_MODEL
              value: "openrouter/owl-alpha"
            - name: GEMINI_MODEL
              value: "gemini-3.1-flash-lite"
            - name: GEMINI_MIN_INTERVAL_MS
              value: "6000"
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
            - name: NAMESPACE
              value: "ai-ops"
            - name: CONFIDENCE_THRESHOLD
              value: "0.8"
            - name: LOG_LEVEL
              value: "info"
            - name: GEMINI_MAX_RETRIES
              value: "1"
            - name: ALERT_COOLDOWN_MS
              value: "300000"   # 5 minutes
          volumeMounts:
            - name: incident-data
              mountPath: /app/data
      volumes:
        - name: incident-data
          emptyDir: {}        # swap for PersistentVolumeClaim in prod

