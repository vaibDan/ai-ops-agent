global:
  scrape_interval: 15s
  evaluation_interval: 15s

# No Alertmanager needed for local dev — use send-alert.sh to manually trigger
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["host.docker.internal:9093"]

rule_files:
  - "/etc/prometheus/alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Points to sample-app running locally on your host machine
  - job_name: "sample-app"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Points to agent running locally on your host machine
  - job_name: "ai-ops-agent"
    static_configs:
      - targets: ["host.docker.internal:3000"]
    metrics_path: /metrics
    scrape_interval: 15s
