global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "sample-app"
    static_configs:
      - targets: ["sample-app:3001"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "ai-ops-agent"
    static_configs:
      - targets: ["agent:3000"]
    metrics_path: /metrics
    scrape_interval: 15s
