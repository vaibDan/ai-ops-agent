groups:
  - name: app_alerts
    interval: 15s
    rules:
      # ── High HTTP error rate ─────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[2m])
            /
            rate(http_requests_total[2m])
          ) > 0.1
        for: 1m
        labels:
          severity: critical
          service: sample-app
          action_hint: restart_or_rollback
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 2 minutes"

      # ── High CPU usage ───────────────────────────────────────────────────
      - alert: HighCpuUsage
        expr: |
          process_cpu_seconds_total > 0.8
        for: 2m
        labels:
          severity: warning
          service: sample-app
          action_hint: scale_up
        annotations:
          summary: "High CPU on {{ $labels.service }}"
          description: "CPU usage at {{ $value }}s cumulative"

      # ── App completely down ──────────────────────────────────────────────
      - alert: AppDown
        expr: up{job="sample-app"} == 0
        for: 30s
        labels:
          severity: critical
          service: sample-app
          action_hint: restart
        annotations:
          summary: "sample-app is DOWN"
          description: "Prometheus cannot scrape sample-app — it may be crashed"

      # ── High request latency ─────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 2
        for: 2m
        labels:
          severity: warning
          service: sample-app
          action_hint: scale_up
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "p95 latency is {{ $value | humanizeDuration }}"

      # ── Simulated spike trigger (for testing) ────────────────────────────
      - alert: ErrorSpike
        expr: app_error_spike == 1
        for: 0s
        labels:
          severity: critical
          service: sample-app
          action_hint: restart_or_rollback
        annotations:
          summary: "Error spike detected (test trigger)"
          description: "Manual spike was injected via /spike endpoint"
